<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>千里·知途 — 上海中考志愿助手</title>
  <link rel="stylesheet" href="/mobile/css/mobile.css" />
  <script src="/js/vendor/react.min.js"></script>
  <script src="/js/vendor/react-dom.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script src="/js/jsx-runtime.js?v=1778020293"></script>
  <script src="/js/api.js?v=1778020293"></script>
  <script src="/js/util.js?v=1778020293"></script>
  <script src="/js/components.js?v=1777954672"></script>
  <script src="/mobile/js/components.js?v=1777954672"></script>
  <script src="/mobile/js/pages/Home.js?v=1778020293"></script>
  <script src="/mobile/js/pages/Schools.js?v=1778020293"></script>
  <script src="/mobile/js/pages/SchoolDetail.js?v=1778020293"></script>
  <script src="/mobile/js/pages/Compare.js?v=1778020293"></script>
  <script src="/mobile/js/pages/Recommend.js?v=1778020293"></script>
  <script src="/mobile/js/pages/About.js?v=1778020293"></script>

  <script>
    function App() {
      const [tab, setTab] = React.useState('home');
      const [schoolId, setSchoolId] = React.useState(null);
      const [prevTab, setPrevTab] = React.useState(null);
      const [searchQ, setSearchQ] = React.useState('');

      const openSchool = (id) => { setPrevTab(tab); setSchoolId(id); setTab('detail'); };
      const navigate = (t, opts) => {
        if (opts && opts.q) setSearchQ(opts.q);
        else setSearchQ('');
        setTab(t);
        window.scrollTo(0, 0);
      };
      const goBack = () => { setTab(prevTab || 'home'); setPrevTab(null); };

      const showDetail = tab === 'detail';
      const baseTab = showDetail ? (prevTab || 'home') : tab;
      const showTabBar = !['detail', 'recommend'].includes(tab);

      return (
        React.createElement('div', { style: { minHeight: '100vh', background: 'var(--bg)', paddingBottom: showTabBar ? 'var(--tab-h)' : 0 } },
          React.createElement('div', { style: { display: showDetail ? 'none' : 'block' } },
            baseTab === 'home' && React.createElement(MHome, { onNavigate: navigate, onOpenSchool: openSchool }),
            baseTab === 'schools' && React.createElement(MSchools, { onOpenSchool: openSchool, onBack: function() { navigate('home'); }, initialQuery: searchQ }),
            baseTab === 'compare' && React.createElement(MCompare, { onOpenSchool: openSchool, onBack: function() { navigate('home'); } }),
            baseTab === 'recommend' && React.createElement(MRecommend, { onOpenSchool: openSchool, onBack: function() { navigate('home'); } }),
            baseTab === 'about' && React.createElement(MAbout, { onBack: function() { navigate('home'); } })
          ),
          showDetail && React.createElement(MSchoolDetail, { schoolId: schoolId, onBack: goBack }),
          showTabBar && React.createElement(MTabBar, { tab: tab, setTab: navigate })
        )
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
